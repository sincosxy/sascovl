<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Верхняя грань куба (Яркий оранжевый) -->
  <path d="M16 4 L28 11 L16 18 L4 11 Z" fill="#FF6B00"/>
  
  <!-- Левая грань (Глубокий графит логистики) -->
  <path d="M4 11 L16 18 L16 28 L4 21 Z" fill="#1E293B"/>
  
  <!-- Правая грань в виде динамичной стрелки вперед (Неоновый голубой flow) -->
