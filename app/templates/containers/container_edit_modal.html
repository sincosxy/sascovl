<div 
    id="container-edit-modal" 
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-60"
    x-data="{ open: true }"
    x-show="open"
    x-transition
    hx-on::after-request="if(event.detail.successful) document.getElementById('container-edit-modal').remove()"
>
    <div 
        class="bg-white rounded-xl shadow-2xl border border-gray-100 w-full max-w-sm overflow-hidden transform transition-all m-4"
        @click.away="document.getElementById('container-edit-modal').remove()"
    >
        <!-- Шапка -->
        <div class="px-5 py-3.5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h4 class="text-sm font-bold text-gray-800 flex items-center gap-1.5">
                <span>📦</span> Редактирование контейнера
            </h4>
            <button 
                type="button" 
                onclick="document.getElementById('container-edit-modal').remove()" 
                class="text-gray-400 hover:text-gray-600 cursor-pointer text-lg p-1 transition"
            >
                &times;
            </button>
        </div>
        
        <!-- Форма -->
        <form 
            hx-post="/containers/{{ container.id }}/edit" 
            hx-target="#container-row-{{ container.id }}" 
            hx-swap="outerHTML"
            class="p-5 flex flex-col gap-3.5 text-xs text-gray-700"
        >
            <!-- Номер контейнера -->
            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-gray-600">Номер контейнера:</label>
                <input type="text" name="container_number" value="{{ container.container_number or '' }}" required 
                       class="w-full p-2 border border-gray-300 rounded-md font-mono focus:outline-hidden focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition">
            </div>

            <!-- Брутто и Места (в одну строку для компактности) -->
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1.5">
                    <label class="font-semibold text-gray-600">Вес брутто (кг):</label>
                    <input type="number" name="weight_gross" value="{{ container.weight_gross or 0 }}"
                           class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-blue-500 transition">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="font-semibold text-gray-600">Кол-во мест:</label>
                    <input type="number" name="pieces" value="{{ container.pieces or 0 }}"
                           class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-blue-500 transition">
                </div>
            </div>

            <!-- Пломба и Пин-код -->
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1.5">
                    <label class="font-semibold text-gray-600">Пломба:</label>
                    <input type="text" name="seal" value="{{ container.seal or '' }}"
                           class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-blue-500 transition">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="font-semibold text-gray-600">Пин-код:</label>
                    <input type="text" name="pin_code" value="{{ container.pin_code or '' }}"
                           class="w-full p-2 border border-gray-300 rounded-md font-mono focus:outline-hidden focus:border-blue-500 transition">
                </div>
            </div>

            <!-- Описание груза -->
            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-gray-600">Описание груза:</label>
                <textarea name="cargo_description" class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-blue-500 transition h-16 resize-none">{{ container.cargo_description or '' }}</textarea>
            </div>

            <!-- Действия -->
            <div class="flex justify-end gap-2 mt-2 pt-3 border-t border-gray-100">
                <button 
                    type="button" 
                    onclick="document.getElementById('container-edit-modal').remove()" 
                    class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-md font-semibold cursor-pointer transition"
                >
                    Отмена
                </button>
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 active:scale-98 text-white px-4 py-1.5 rounded-md font-bold cursor-pointer transition shadow-md shadow-blue-600/10"
                >
                    Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
