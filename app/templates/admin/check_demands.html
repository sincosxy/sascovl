<div class="max-w-4xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Поиск и проверка требований</h1>
    
    <!-- Форма поиска через HTMX -->
    <form hx-post="/admin/check_demands" 
          hx-target="#search-results" 
          hx-indicator="#loading-spinner"
          class="flex flex-col sm:flex-row gap-4 mb-8">
        
        <div class="flex-grow">
            <label for="container_number" class="sr-only">Номер контейнера</label>
            <input type="text" 
                   id="container_number" 
                   name="container_number" 
                   required
                   placeholder="Введите номер контейнера (например, TCKU1234567)" 
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        
        <button type="submit" 
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2 min-w-[140px]">
            <!-- Спиннер загрузки (скрыт по умолчанию через Tailwind class 'htmx-indicator') -->
            <svg id="loading-spinner" class="animate-spin h-5 w-5 text-white hidden [&.htmx-request]:block" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Найти</span>
        </button>
    </form>

    <!-- Блок ниже формы, куда HTMX вставит результат работы эндпоинта -->
    <div id="search-results" class="border-t border-gray-100 pt-4">
        <p class="text-gray-500 text-center py-4">Введите номер контейнера выше, чтобы начать поиск.</p>
    </div>
</div>
