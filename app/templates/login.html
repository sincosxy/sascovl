{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Вход в систему</h2>
    <form hx-post="/api/login" 
      hx-target="#login-error" 
      class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="username" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Пароль</label>
            <input type="password" name="password" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        </div>
        <div id="login-error" class="text-red-500 text-sm mt-2 text-center"></div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
            Войти
        </button>
    </form>
</div>
{% endblock %}
