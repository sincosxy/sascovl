<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoFlow</title>
    <!-- Tailwind CSS -->
    <!--script src="https://tailwindcss.com"></script-->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Навигация оператора -->
<!-- Навигация оператора -->
    <nav x-data="{ mobileMenuOpen: false }" class="bg-slate-900 text-white shadow-2xl relative">
        <div id="global-loader" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/10 backdrop-blur-[1px]">
            <div class="bg-white p-4 rounded-xl shadow-lg flex items-center gap-3">
                <div class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div>
                <span class="text-sm font-medium text-slate-800">Обработка...</span>
            </div>
        </div>
        
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Левая часть: Логотип -->
                <div class="flex items-center gap-8">
                    <span class="text-xl font-black tracking-tighter text-blue-400">CARGO<span class="text-white">OPS</span></span>
                    
                    <!-- Десктопное меню (Скрыто на мобилках) -->
                    <div class="hidden md:flex gap-4 text-sm font-medium">
                        <button hx-get="/admin/dashboard" hx-target="#main-content" class="hover:text-blue-400 transition cursor-pointer">Заказы</button>
                        <button hx-get="/admin/" hx-target="#main-content" class="hover:text-blue-400 transition cursor-pointer">Контрагенты</button>
                        <button hx-get="/voyages/" hx-target="#main-content" class="hover:text-blue-400 transition cursor-pointer">Рейсы</button>
                        <button hx-get="/containers/" hx-target="#main-content" class="hover:text-blue-400 transition cursor-pointer">Контейнеры</button>
                        {% if user.role.value == 'admin' %}
                            <button hx-get="/admin/demands" hx-target="#main-content" class="hover:text-blue-400 transition cursor-pointer">Требования ВМТП</button>
                        {% endif %}
                    </div>
                </div>

                <!-- Правая часть: Юзер и Выход (Десктоп) + Бургер (Мобилка) -->
                <div class="flex items-center gap-4">
                    <!-- Инфо о юзере (Только десктоп) -->
                    <div class="text-right hidden md:block">
                        <div class="text-xs text-gray-400">Оператор</div>
                        <div class="text-sm font-bold">{{ user.name }}</div>
                    </div>
                    <!-- Кнопка выхода (Только десктоп) -->
                    <button hx-post="/api/logout" hx-target="body" class="hidden md:block bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white px-3 py-1.5 rounded transition text-xs font-bold border border-red-500/50 cursor-pointer">
                        Выход
                    </button>

                    <!-- Кнопка Бургера для мобилок -->
                    <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 text-gray-400 hover:text-white focus:outline-none cursor-pointer" aria-label="Открыть меню">
                        <svg class="h-6 w-6 transition duration-300" :class="{'rotate-90': mobileMenuOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Мобильное меню на Alpine.js -->
        <div x-show="mobileMenuOpen" 
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-2"
            @click.away="mobileMenuOpen = false"
            class="md:hidden absolute top-16 left-0 w-full bg-slate-900 border-t border-slate-800 shadow-xl z-50">
            
            <div class="px-4 py-3 space-y-3 font-medium text-base">
                <!-- Профиль на мобилке -->
                <div class="pb-2 border-b border-slate-800">
                    <div class="text-xs text-gray-400">Оператор</div>
                    <div class="text-sm font-bold text-blue-400">{{ user.name }}</div>
                </div>

                <!-- Ссылки (каждая на всю ширину для удобного тапа) -->
                <button @click="mobileMenuOpen = false" hx-get="/admin/dashboard" hx-target="#main-content" class="block w-full text-left py-2 hover:text-blue-400 transition cursor-pointer">Заказы</button>
                <button @click="mobileMenuOpen = false" hx-get="/admin/" hx-target="#main-content" class="block w-full text-left py-2 hover:text-blue-400 transition cursor-pointer">Контрагенты</button>
                <button @click="mobileMenuOpen = false" hx-get="/voyages/" hx-target="#main-content" class="block w-full text-left py-2 hover:text-blue-400 transition cursor-pointer">Рейсы</button>
                <button @click="mobileMenuOpen = false" hx-get="/containers/" hx-target="#main-content" class="block w-full text-left py-2 hover:text-blue-400 transition cursor-pointer">Контейнеры</button>
                {% if user.role.value == 'admin' %}
                    <button @click="mobileMenuOpen = false" hx-get="/admin/demands" hx-target="#main-content" class="block w-full text-left py-2 hover:text-blue-400 transition cursor-pointer">Требования ВМТП</button>
                {% endif %}

                <!-- Выход на мобилке -->
                <div class="pt-2 border-t border-slate-800">
                    <button hx-post="/api/logout" hx-target="body" class="w-full bg-red-600 hover:bg-red-700 text-white text-center py-2.5 rounded font-bold transition text-sm cursor-pointer">
                        Выйти из аккаунта
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Контентная область -->
    <main id="main-content" class="container mx-auto mt-6 px-4 pb-12">
        {% block content %}{% endblock %}
    </main>

    <script>
        document.body.addEventListener('htmx:beforeRequest', () => {
            document.getElementById('global-loader').style.display = 'flex';
        });
        document.body.addEventListener('htmx:afterRequest', () => {
            document.getElementById('global-loader').style.display = 'none';
        });

        // Для обычных форм
        window.onbeforeunload = function() {
            document.getElementById('global-loader').style.display = 'flex';
        };
        // Чтобы HTMX всегда знал, куда подгружать ответы из меню оператора
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.target.id === "main-content") {
                window.scrollTo(0, 0);
            }
        });


    </script>
</body>
</html>
