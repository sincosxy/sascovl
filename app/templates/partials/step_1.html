<div class="animate-in fade-in duration-500">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Шаг 1: Тип перевозки</h2>
    <p class="text-sm text-gray-500 mb-6">Заказ №{{ order_id }}</p>
    
    {% include 'partials/wizard_nav.html' %}

    <form hx-post="/api/orders/{{ order_id }}/check-type" hx-target="#main-content" class="space-y-6">
        
        <!-- Поле даты погрузки -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                📅 Предполагаемая дата погрузки
            </label>
            <input type="date" name="loading_date" 
                   value="{{ default_date }}"
                   min="{{ today }}"
                   class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <!-- Вариант: Контейнер -->
            <label class="relative border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-blue-500 transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
               <input type="radio" name="transport_type" value="container" class="hidden" 
                    {% if order and order.transport_type.value|lower == 'container' %}checked{% endif %}>
                <div class="text-center">
                    <span class="text-3xl">📦</span>
                    <p class="font-semibold mt-2">Контейнер</p>
                </div>
            </label>

            <!-- Вариант: Генгруз -->
            <label class="relative border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-blue-500 transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
                <input type="radio" name="transport_type" value="general_cargo" class="hidden"
                    {% if order and order.transport_type.value|lower == 'general_cargo' %}checked{% endif %}>
                <div class="text-center">
                    <span class="text-3xl">🏗️</span>
                    <p class="font-semibold mt-2">Ген. груз</p>
                </div>
            </label>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
            Далее →
        </button>
    </form>
</div>
