<div class="animate-in slide-in-from-right duration-300">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Уточнение по контейнерам</h2>
    {% include 'partials/wizard_nav.html' %}
    <form hx-patch="/api/orders/{{ order_id }}/step-1" hx-target="#main-content" class="space-y-6">
        <!-- Скрытый тип, который выбрали на прошлом экране -->
        <input type="hidden" name="transport_type" value="{{ transport_type }}">

        <div class="space-y-4">
            <label class="block p-4 border-2 rounded-xl cursor-pointer hover:bg-blue-50 border-gray-200 has-[:checked]:border-blue-600">
                <input type="radio" name="is_soc" value="false"  
                        {% if order.is_soc == False or order.is_soc is none %} checked {% endif %}
                       onclick="document.getElementById('soc_fields').classList.add('hidden')">
                <span class="ml-2 font-bold">Линейные (COC)</span>
                <p class="text-xs text-gray-500 ml-6">Используем оборудование перевозчика</p>
            </label>

            <label class="block p-4 border-2 rounded-xl cursor-pointer hover:bg-purple-50 border-gray-200 has-[:checked]:border-purple-600">
                <input type="radio" name="is_soc" value="true"
                       {% if order.is_soc == True %} checked {% endif %}
                       onclick="document.getElementById('soc_fields').classList.remove('hidden')">
                <span class="ml-2 font-bold text-purple-600">Собственные (SOC)</span>
                <p class="text-xs text-gray-500 ml-6">Свой парк контейнеров</p>
            </label>
        </div>

        <div id="soc_fields" class="{% if not order.is_soc %}hidden{% endif %} space-y-4 p-4 bg-purple-50 rounded-xl border border-purple-100">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="needs_return" value="true" 
                    {% if order.return_instructions %}checked{% endif %} 
                    class="w-4 h-4 text-purple-600 rounded">
                <span class="text-sm font-bold text-purple-900">Нужен возврат порожнего</span>
            </label>

            <div class="mt-2">
                <label class="block text-xs font-semibold text-purple-700 mb-1">Инструкции по сдаче (необязательно):</label>
                <textarea name="return_instructions" 
                        class="w-full border-purple-200 rounded-lg p-2 text-sm focus:ring-purple-500" 
                        placeholder="Например: Сдать в депо 'Морской Терминал'...">{{ order.return_instructions or '' }}</textarea>
            </div>
        </div>

        <div class="flex gap-4">
            <!--button type="button" hx-get="/api/orders/init-back/{{ order_id }}" hx-target="#main-content" class="flex-1 py-3 text-gray-500">
                Назад
            </button-->
            <button type="submit" class="flex-[2] bg-blue-600 text-white py-3 rounded-lg font-bold">
                Готово, к маршруту →
            </button>
        </div>
    </form>
</div>
