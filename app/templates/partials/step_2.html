<div class="animate-in slide-in-from-right duration-300">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800">Шаг 2: Маршрут и участники</h2>
        <span class="text-xs font-mono bg-gray-100 px-2 py-1 rounded">ID: {{ order_id }}</span>
    </div>
    {% include 'partials/wizard_nav.html' %}
    <form hx-patch="/api/orders/{{ order_id }}/step-2" hx-target="#main-content" class="space-y-6">
        
        <!-- Секция ПОРТЫ -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-blue-50 rounded-lg">
            <div>
                <label class="block text-xs font-semibold text-blue-700 uppercase">Порт погрузки (POL)</label>
                <select name="pol_id" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2">
                    <option value="" disabled selected>Выберите порт...</option>
                    {% for port in ports %}
                    <option value="{{ port.id }}" {% if order and order.pol_id == port.id %}selected{% endif %}>{{ port.name }} ({{ port.code }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-blue-700 uppercase">Порт выгрузки (POD)</label>
                <select name="pod_id" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2">
                    <option value="" disabled selected>Выберите порт...</option>
                    {% for port in ports %}
                    <option value="{{ port.id }}" {% if order and order.pod_id == port.id %}selected{% endif %}>{{ port.name }} ({{ port.code }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Секция УЧАСТНИКИ -->
        <div class="space-y-4 pt-2">
            <!--div>
                <label class="block text-sm font-medium text-gray-700">Грузоотправитель (Shipper)</label>
                <input type="text" name="shipper_name" required
                       placeholder="Начните вводить название компании..." 
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 border">
            </div-->
            <!--div class="form-group space-y-4 pt-2">
                <label class="block text-sm font-medium text-gray-700">Грузоотправитель (Shipper)</label>
                <input type="text" required value="{{ order.shipper.name if order.shipper else ''}}"
                    name="shipper_name" 
                    list="shipper-list"
                    placeholder="Начните вводить название..."
                    hx-get="/api/counterparties/search" 
                    hx-trigger="keyup changed delay:300ms" 
                    hx-target="#shipper-list" 
                    autocomplete="off"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 border">
                
                <datalist id="shipper-list">

                </datalist>
            </div-->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="cp-group relative">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Отправитель</label>
                    <input type="text" name="shipper_name" autocomplete="off"
                        hx-get="/api/search/counterparty" hx-trigger="keyup changed delay:300ms, focus" hx-target="next .results"
                        value="{{ order.shipper.name if order.shipper else '' }}" class="w-full border rounded p-2">
                    <div class="results"></div>
                    
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="text" name="shipper_inn" placeholder="ИНН" value="{{ order.shipper.inn or '' }}" class="text-xs border rounded p-1">
                        <input type="text" name="shipper_contact" placeholder="Контакты" value="{{ order.shipper.contact_info or '' }}" class="text-xs border rounded p-1">
                        <input type="text" name="shipper_address" placeholder="Адрес" value="{{ order.shipper.address or '' }}" class="col-span-2 text-xs border rounded p-1">
                    </div>
                </div>
                <div class="cp-group relative">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Отправитель</label>
                    <input type="text" name="consignee_name" autocomplete="off"
                        hx-get="/api/search/counterparty" hx-trigger="keyup changed delay:300ms, focus" hx-target="next .results"
                        value="{{ order.consignee.name if order.consignee else '' }}" class="w-full border rounded p-2">
                    <div class="results"></div>
                    
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="text" name="consignee_inn" placeholder="ИНН" value="{{ order.consignee.inn or '' }}" class="text-xs border rounded p-1">
                        <input type="text" name="consignee_contact" placeholder="Контакты" value="{{ order.consignee.contact_info or '' }}" class="text-xs border rounded p-1">
                        <input type="text" name="consignee_address" placeholder="Адрес" value="{{ order.consignee.address or '' }}" class="col-span-2 text-xs border rounded p-1">
                    </div>
                </div>
            </div>
            
            <!--div class="form-group space-y-4 pt-2">
                <label class="block text-sm font-medium text-gray-700">Грузополучатель (Consignee)</label>
                <input type="text" name="consignee_name" required value="{{ order.consignee.name if order.consignee else ''}}"
                        placeholder="ИНН или Название..." 
                        list="consignee-list"
                        hx-get="/api/counterparties/search" 
                        hx-trigger="keyup changed delay:300ms" 
                        hx-target="#consignee-list" 
                        autocomplete="off"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 border">
                <datalist id="consignee-list">

                </datalist>
            </div-->

            <div class="form-group space-y-4 pt-2">
                <label class="block text-sm font-medium text-gray-700">Уведомить (Notify Party)</label>
                <input type="text"  value="{{ order.notify_party.name if order.notify_party else ''}}"
                        name="notify_name" 
                        placeholder="Оставьте пустым, если совпадает с получателем" 
                        list="notify-list"
                        hx-get="/api/counterparties/search" 
                        hx-trigger="keyup changed delay:300ms, focus" 
                        hx-target="#notify-list" 
                        autocomplete="off"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 border">
                <datalist id="notify-list">
                    <!-- Сюда HTMX подставит <option> из поиска -->
                </datalist>
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">
            Далее: Детали груза →
        </button>
    </form>
</div>
<script>
    document.addEventListener('click', function (e) {
    // Если кликнули не по результатам поиска и не по самому инпуту
    if (!e.target.closest('.results') && !e.target.closest('input[hx-get]')) {
        document.querySelectorAll('.results').forEach(el => el.innerHTML = '');
    }
});
</script>
