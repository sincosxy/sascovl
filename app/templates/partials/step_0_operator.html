<div id="step-container" class="max-w-2xl mx-auto p-8 bg-white shadow-xl rounded-2xl border border-gray-100" 
     x-data="{ selectedClient: null, search: '' }">
    
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-100 text-amber-600 rounded-full mb-4">
            <!-- Иконка оператора / управления -->
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Панель оператора</h2>
        <p class="text-gray-500">Выберите клиента, для которого оформляется поручение</p>
    </div>

    <!-- Форма отправляет выбранного клиента на тот же эндпоинт инициации -->
    <form hx-post="/api/orders/init" hx-target="#main-content" class="space-y-6">
        
        <!-- Скрытое поле для передачи ID выбранного клиента на бэкенд -->
        <input type="hidden" name="client_id" :value="selectedClient ? selectedClient.id : ''">
        <input type="hidden" name="restricted_items" value="no">
        <!-- Блок выбора клиента -->
        <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 block">Компания / Заказчик:</label>
            
            <!-- Поле живого поиска (HTMX запрашивает список при вводе) -->
            <div class="relative">
                <input type="text" 
                       name="search_query"
                       placeholder="Введите название компании, ИНН или email..." 
                       class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                       hx-get="/api/clients/search" 
                       hx-trigger="keyup changed delay:300ms" 
                       hx-target="#search-results"
                       @focus="selectedClient = null"
                >
                
                <!-- Контейнер для выпадающих результатов от HTMX -->
                <div id="search-results" class="absolute z-10 w-full bg-white mt-1 border rounded-xl shadow-lg max-h-60 overflow-y-auto hidden">
                    <!-- Сюда бэкенд вернет список элементов -->
                </div>
            </div>
        </div>

        <!-- Визуальный плашка-индикатор выбранного клиента -->
        <div x-show="selectedClient" x-transition class="p-4 bg-green-50 border border-green-200 rounded-xl flex items-center justify-between">
            <div>
                <p class="text-xs text-green-600 font-semibold uppercase tracking-wider">Выбранный заказчик:</p>
                <p class="text-sm font-bold text-gray-800" x-text="selectedClient ? selectedClient.name : ''"></p>
                <p class="text-xs text-gray-500" x-text="selectedClient ? 'ИНН: ' + selectedClient.inn : ''"></p>
            </div>
            <button type="button" @click="selectedClient = null; document.getElementsByName('search_query')[0].value = ''" class="text-gray-400 hover:text-red-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Кнопка перехода к следующему шагу -->
        <div class="pt-4">
            <button type="submit" 
                    x-bind:disabled="!selectedClient"
                    class="w-full py-3 bg-amber-500 text-white rounded-xl font-bold shadow-lg transition-all
                           disabled:bg-gray-300 disabled:shadow-none disabled:cursor-not-allowed hover:bg-amber-600">
                Открыть оформление заявки
            </button>
        </div>
    </form>
</div>
