<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z'/%3E%3Cpath d='m3.3 7 8.7 5 8.7-5'/%3E%3Cpath d='M12 22V12'/%3E%3C/svg%3E">
    <title>CargoFlow</title>
    <!-- Tailwind CSS -->
    <!--script src="https://tailwindcss.com"></script-->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div id="global-loader" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/10 backdrop-blur-[1px]">
            <div class="bg-white p-4 rounded-xl shadow-lg flex items-center gap-3">
                <div class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div>
                <span class="text-sm font-medium">Обработка...</span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button hx-get="/api/orders" 
                    hx-target="main" 
                    class="text-white hover:underline">
                Мои заказы
            </button>
            {% if user and user.role in ['ADMIN', 'OPERATOR'] %}
            <button hx-get="/api/operator/dashboard" 
                hx-target="main" 
                class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-sm font-bold border border-blue-400">
            👷 Панель оператора
            </button>
            {% endif %}
            <button hx-post="/api/logout" hx-target="body" class="text-sm bg-red-500 px-3 py-1 rounded">Выйти</button>
        </div>
    </nav>
    
    <main id="main-content" class="container mx-auto mt-10 p-4">
        {% block content %}{% endblock %}
    </main>
    <script>
        // Для HTMX
        document.body.addEventListener('htmx:beforeRequest', () => {
            document.getElementById('global-loader').style.display = 'flex';
        });
        document.body.addEventListener('htmx:afterRequest', () => {
            document.getElementById('global-loader').style.display = 'none';
        });

        // Для обычных форм
        window.onbeforeunload = function() {
            document.getElementById('global-loader').style.display = 'flex';
        };
    </script>

</body>
</html>
