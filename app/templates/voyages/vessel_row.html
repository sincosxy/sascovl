<tr id="voyage-row-{{ voyage.id }}">
    <!-- Номер рейса -->
    <td class="p-4 font-bold text-gray-900 align-middle">
        {{ voyage.number }}
    </td>
    
    <!-- Судно -->
    <td class="p-4 text-gray-700 align-middle">
        <div class="font-medium text-gray-800">{{ voyage.vessel.name }}</div>
        <div class="text-xs text-gray-400 font-normal">({{ voyage.vessel.name_eng }})</div>
    </td>
    
    <!-- Маршрут -->
    <td class="p-4 text-gray-700 align-middle font-medium">
        <span class="inline-flex items-center gap-2">
            <span>{{ voyage.departure_port.name }}</span>
            <span class="text-gray-400 font-light">→</span>
            <span>{{ voyage.destination_port.name }}</span>
        </span>
    </td>
    
    <!-- Даты -->
    <td class="p-4 align-middle text-xs leading-relaxed">
        <div class="flex items-center gap-1.5 text-emerald-600 font-semibold" title="Дата отхода">
            <span class="text-[10px] uppercase tracking-wider text-emerald-500/80">ETD:</span>
            {{ voyage.departure_date.strftime('%d.%m.%Y') }}
        </div>
        <div class="flex items-center gap-1.5 text-gray-500 font-medium" title="Дата прихода">
            <span class="text-[10px] uppercase tracking-wider text-gray-400/80">ETA:</span>
            {{ voyage.arrival_date.strftime('%d.%m.%Y') }}
        </div>
    </td>
    
    <!-- Счетчик контейнеров -->
    <td class="p-4 align-middle">
        <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-xs font-bold px-2.5 py-1 rounded-md border border-slate-200 shadow-2xs">
            <span>📦</span> {{ voyage.containers|length }}
        </span>
    </td>
    
    <!-- Кнопки управления (Действия) -->
    <td class="p-4 align-middle">
        <div class="flex items-center gap-2 justify-end">
            <!-- Кнопка Наполнить контейнерами -->
            <button 
                hx-get="/voyages/{{ voyage.id }}/containers" 
                hx-target="#main-workspace" 
                class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-xs font-semibold px-3 py-1.5 rounded-md cursor-pointer transition shadow-xs"
            >
                Контейнеры
            </button>

            <!-- Кнопка Редактировать -->
            <button 
                hx-get="/voyages/{{ voyage.id }}/edit" 
                hx-target="#modal-container" 
                onclick="document.getElementById('modal-container').classList.remove('hidden')"
                class="bg-slate-600 hover:bg-slate-700 active:scale-95 text-white text-xs font-semibold px-3 py-1.5 rounded-md cursor-pointer transition shadow-xs"
            >
                Редактировать
            </button>
            
            <!-- Кнопка Удалить -->
            <button 
                hx-delete="/voyages/{{ voyage.id }}" 
                hx-target="#voyage-row-{{ voyage.id }}" 
                hx-swap="outerHTML" 
                hx-confirm="Вы уверены, что хотите удалить рейс {{ voyage.number }}?"
                class="bg-red-500 hover:bg-red-600 active:scale-95 text-white text-xs font-semibold px-3 py-1.5 rounded-md cursor-pointer transition shadow-xs"
            >
                Удалить
            </button>
        </div>
    </td>
</tr>
