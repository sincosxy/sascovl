<div 
    id="vessel-quick-modal" 
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-60"
    x-data="{ open: true }"
    x-show="open"
    x-transition
>
    <div 
        class="bg-white rounded-xl shadow-2xl border border-gray-100 w-full max-w-sm overflow-hidden transform transition-all m-4"
        @click.away="document.getElementById('vessel-quick-modal').remove()"
    >
        <!-- Шапка -->
        <div class="px-5 py-3.5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h4 class="text-sm font-bold text-gray-800 flex items-center gap-1.5">
                <span>🚢</span> Быстрое добавление судна
            </h4>
            <button 
                type="button" 
                onclick="document.getElementById('vessel-quick-modal').remove()" 
                class="text-gray-400 hover:text-gray-600 cursor-pointer text-lg p-1 transition"
            >
                &times;
            </button>
        </div>
        
        <!-- Форма -->
        <form 
            hx-post="/voyages/vessels/" 
            hx-swap="none"
            class="p-5 flex flex-col gap-3.5 text-xs text-gray-700"
        >
            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-gray-600">Название (РУС):</label>
                <input type="text" name="name" value="{{ preset_name }}" required 
                       class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-gray-600">Название (АНГЛ):</label>
                <input type="text" name="name_eng" required placeholder="Например, Kapitan Maslov"
                       class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="font-semibold text-gray-600">Описание (необязательно):</label>
                <textarea name="description" class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition h-16 resize-none"></textarea>
            </div>

            <!-- Действия -->
            <div class="flex justify-end gap-2 mt-2 pt-3 border-t border-gray-100">
                <button 
                    type="button" 
                    onclick="document.getElementById('vessel-quick-modal').remove()" 
                    class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-md font-semibold cursor-pointer transition"
                >
                    Отмена
                </button>
                <button 
                    type="submit" 
                    class="bg-emerald-600 hover:bg-emerald-700 active:scale-98 text-white px-4 py-1.5 rounded-md font-bold cursor-pointer transition shadow-md shadow-emerald-600/10"
                >
                    Создать и выбрать
                </button>
            </div>
        </form>
    </div>
</div>
