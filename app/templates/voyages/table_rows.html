<!-- Верхняя панель -->
<div class="mb-6 flex justify-between items-center">
    <h2 class="text-xl font-bold text-gray-800">Список рейсов</h2>
    <button 
        onclick="document.getElementById('modal-container').classList.remove('hidden')"
        hx-get="/voyages/new" 
        hx-target="#modal-container" 
        hx-swap="innerHTML"
        class="bg-blue-600 hover:bg-blue-700 active:scale-98 text-white px-4 py-2 rounded-lg font-semibold text-sm cursor-pointer transition shadow-md shadow-blue-600/20 flex items-center gap-2"
    >
        <span>➕</span> Добавить рейс
    </button>
</div>


<div class="bg-white border border-gray-200 rounded-xl shadow-xs overflow-hidden">
    <table class="w-full border-collapse text-left text-sm text-gray-600">
        <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[15%]">Номер рейса</th>
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[25%]">Судно</th>
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[25%]">Маршрут</th>
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[15%]">Даты</th>
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[10%]">Контейнеры</th>
                <th class="p-4 font-semibold text-gray-500 uppercase text-xs tracking-wider w-[10%] text-right">Действия</th>
            </tr>
        </thead>
        
        <tbody id="voyages-table-body" class="divide-y divide-gray-100 [&>tr]:transition-colors [&>tr]:duration-150 hover:[&>tr]:bg-gray-50/70">
        {% for voyage in voyages %}
            {% include "voyages/vessel_row.html" %}
        {% else %}
            <!-- Красивое пустое состояние -->
            <tr class="empty-row bg-white">
                <td colspan="6" class="text-center text-gray-500 py-12 px-4">
                    <div class="text-4xl mb-3">🚢</div>
                    <div class="text-base font-semibold text-gray-800 mb-1">Рейсы не найдены</div>
                    <div class="text-sm text-gray-400 mb-4">Создайте свой первый рейс для начала работы</div>
                    <button 
                        onclick="document.getElementById('modal-container').classList.remove('hidden')"
                        hx-get="/voyages/new" 
                        hx-target="#modal-container" 
                        hx-swap="innerHTML"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold text-xs cursor-pointer transition shadow-xs"
                    >
                        + Добавить первый рейс
                    </button>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>


<!-- Контейнер для модальных окон (Использует Tailwind Backdrop blur) -->
<div id="modal-container" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50">
    <!-- Сюда подгружается форма рейса -->
</div>

<script>
    // Закрытие модального окна рейса
    document.body.addEventListener('close-voyage-modal', function() {
        const modal = document.getElementById('modal-container');
        if (modal) {
            modal.innerHTML = ''; 
            modal.classList.add('hidden'); 
        }
    });
</script>
