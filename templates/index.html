{% extends "base.html" %}

{% block content %}
<div class="bg-white p-8 rounded-xl shadow-md max-w-2xl mx-auto text-center">
    <h1 class="text-3xl font-bold mb-4">Добро пожаловать в личный кабинет</h1>
    <p class="text-gray-600 mb-8">Здесь вы можете оформить поручение на перевозку за несколько шагов.</p>
    
    <!-- Пример магии HTMX: при клике отправит POST и заменит содержимое этого блока -->
    <div id="wizard-container">
        <button 
            hx-post="/api/orders" 
            hx-target="#wizard-container" 
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">
            Начать оформление заявки
        </button>
    </div>
</div>
{% endblock %}
